name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc]
        build_type: [Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure (CMake)
        env:
          CC: ${{ matrix.compiler }}
        run: |
          cmake -S . -B build-ci -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: |
          cmake --build build-ci

      - name: Pipe Benchmark
        run: |
          if [ -x ./build-ci/bin/pipe_bw ]; then
            ./build-ci/bin/pipe_bw --max-bytes=100MiB
          fi
